{% extends "base.html" %}
{% block title %}Kodni tasdiqlash - AI Agent{% endblock %}
{% block content %}
<div class="max-w-md mx-auto py-12">
    <div class="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm text-center">
        <div class="text-5xl mb-4">📱</div>
        <h1 class="text-2xl font-bold text-slate-900 mb-2">Kodni tasdiqlash</h1>
        <p class="text-slate-500 mb-6">{{ account.phone }} ga Telegram'dan kod yuborildi</p>
        
        <form method="post" action="{% url 'base:chat_verify' account.id %}" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-2">Telegram'dan kelgan kod</label>
                <input type="text" name="code" placeholder="12345" class="w-full text-center text-2xl px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-sky-500 font-bold tracking-widest" required autofocus>
            </div>
            
            {% if need_password %}
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-2">Ikki bosqichli parol (2FA)</label>
                <input type="password" name="password" placeholder="Parol" class="w-full px-4 py-3 border border-slate-300 rounded-xl">
            </div>
            {% endif %}
            
            <button type="submit" class="w-full py-3 bg-sky-600 text-white font-bold rounded-xl hover:bg-sky-700 transition-colors">Tasdiqlash</button>
        </form>
        
        <a href="{% url 'base:chat_list' %}" class="inline-block mt-4 text-sm text-slate-400 hover:text-slate-600">Bekor qilish</a>
    </div>
</div>
{% endblock %}
